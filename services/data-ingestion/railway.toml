# Railway configuration for the Data Ingestion service.
# Streams order book data from Binance and OKX WebSockets into Redis.
#
# Required environment variables (set in Railway dashboard):
#   REDIS_URL    = ${{Redis.REDIS_URL}}            (Railway Redis reference var)
#   CONFIG_PATH  = config
#   LOG_LEVEL    = INFO
#   LOG_FORMAT   = json
#   SERVICE_NAME = data-ingestion

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/data-ingestion/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
