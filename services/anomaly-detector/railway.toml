# Railway configuration for the Anomaly Detector service.
# Evaluates dual-condition alert logic against live metrics and dispatches
# alerts to Slack / console.
#
# Required environment variables (set in Railway dashboard):
#   REDIS_URL         = ${{Redis.REDIS_URL}}
#   DATABASE_URL      = postgresql://<user>:<pass>@<timescaledb-host>:5432/surveillance
#   CONFIG_PATH       = config
#   LOG_LEVEL         = INFO
#   LOG_FORMAT        = json
#   SERVICE_NAME      = anomaly-detector
#   SLACK_WEBHOOK_URL = https://hooks.slack.com/...  (optional)

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/anomaly-detector/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
