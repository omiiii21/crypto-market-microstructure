# Railway configuration for the Metrics Engine service.
# Consumes order book snapshots from Redis, computes spread/depth/basis
# metrics, and persists results to TimescaleDB.
#
# Required environment variables (set in Railway dashboard):
#   REDIS_URL    = ${{Redis.REDIS_URL}}
#   DATABASE_URL = postgresql://<user>:<pass>@<timescaledb-host>:5432/surveillance
#   CONFIG_PATH  = config
#   LOG_LEVEL    = INFO
#   LOG_FORMAT   = json
#   SERVICE_NAME = metrics-engine

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/metrics-engine/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
